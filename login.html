<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Seating Arrangement</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a365d, #2b6cb0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            width: 50px; height: 50px;
            background: #1a365d;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 16px;
        }
        h2 { color: #1a365d; font-size: 1.5rem; margin-bottom: 4px; }
        .subtitle { color: #718096; font-size: 0.88rem; margin-bottom: 28px; }
        .alert {
            padding: 10px 14px; border-radius: 6px;
            margin-bottom: 16px; font-size: 0.88rem;
        }
        .alert-error { background: #fed7d7; color: #c53030; border-left: 3px solid #e53e3e; }
        .alert-success { background: #c6f6d5; color: #276749; border-left: 3px solid #38a169; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
        input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e2e8f0; border-radius: 8px;
            font-size: 0.95rem; color: #2d3748;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,0.1); }
        .btn {
            width: 100%; padding: 12px;
            background: #1a365d; color: white;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600;
            cursor: pointer; margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #2b6cb0; }
        .hint { text-align: center; font-size: 0.8rem; color: #a0aec0; margin-top: 16px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo">🎓</div>
    <h2>Seating Arrangement</h2>
    <p class="subtitle">Login to manage exam seating plans</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn" onclick="location.href='dashboard.html'">Login</button>
    </form>
    <p class="hint">Default login: admin / admin123</p>
</div>
</body>
</html>
